origin: https://q.toki317.dev
port: 3000

allowSignUp: true

accessLog:
  enabled: true

mariadb:
  host: mariadb.db.svc.cluster.local
  port: 3306
  username: traq
  # password: specified in env
  database: traq
  connection:
    maxOpen: 20
    maxIdle: 2
    lifeTime: 0

es:
  url: http://traq-es.traq.svc.cluster.local:9200
  username: elastic
  # password: <env secret>

storage:
  type: s3
  s3:
    bucket: toki317-traq
    region: ap-northeast-1
    endpoint: https://s3.ap-northeast-1.amazonaws.com
    # accessKey: <env secret>
    # secretKey: <env secret>
    forcePathStyle: true
    cacheDir: /storage

firebase:
  serviceAccount:
    file: /keys/fcm-service-account.json

# skyway:
#   secretKey: specified in env
